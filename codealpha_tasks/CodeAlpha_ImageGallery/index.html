<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="themeBtn">🌙</button>
   <header>
    <h1>📸 My Image Gallery</h1>
    <p>Explore beautiful moments captured around the world</p>
</header>
<div class="stats">
    <p>Total Photos: <span id="count">0</span></p>
</div>
<div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="nature">Nature</button>
    <button class="filter-btn" data-filter="travel">Travel</button>
    <button class="filter-btn" data-filter="animals">Animals</button>
</div>
   <div class="gallery">
    <img src="images/img1.jpg" class="gallery-item nature" alt="Image 1">
    <img src="images/img2.jpg" class="gallery-item nature" alt="Image 2">
    <img src="images/img3.jpg" class="gallery-item nature" alt="Image 3">
    <img src="images/img4.jpg" class="gallery-item nature" alt="Image 4">
    <img src="images/img5.jpg" class="gallery-item nature" alt="Image 5">
    <img src="images/img6.jpg" class="gallery-item nature" alt="Image 6">
    <img src="images/img7.jpg" class="gallery-item animals" alt="Image 7">
    <img src="images/img8.jpg" class="gallery-item animals" alt="Image 8">
    <img src="images/img9.jpg" class="gallery-item animals" alt="Image 9">
    <img src="images/img10.jpg" class="gallery-item animals" alt="Image 10">
    <img src="images/img11.jpg" class="gallery-item animals" alt="Image 11">
    <img src="images/img12.jpg" class="gallery-item animals" alt="Image 12">
    <img src="images/img13.jpg" class="gallery-item animals" alt="Image 13">
    <img src="images/img14.jpg" class="gallery-item travel" alt="Image 14">
    <img src="images/img15.jpg" class="gallery-item travel" alt="Image 15">
    <img src="images/img16.jpg" class="gallery-item travel" alt="Image 16">
    <img src="images/img17.jpg" class="gallery-item travel" alt="Image 17">
    <img src="images/img18.jpg" class="gallery-item travel" alt="Image 18">
</div>

    <div id="lightbox">
        <span class="close">&times;</span>

        <button id="prev">&#10094;</button>

        <img id="lightbox-img">

        <button id="next">&#10095;</button>
    </div>

    <script src="script.js"></script>

</body>
<footer>
    <p>© 2026 Susanhansika_ImageGallery</p>
</footer>
</html>
